<style>
  /* Wallet connect modal z-index */
  .bn-onboard-custom {
    z-index: 1000;
  }

  /* Loading spinner */
  #app-loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 9999;
    transition: opacity 0.3s ease;
  }

  #app-loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #fafafa;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<body>
  <!-- Loading state -->
  <div id='app-loading'>
    <div class='loading-spinner'></div>
  </div>

  <div id='app'></div>

  
  <script>
    // Hide loading spinner when app is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('app-loading');
        if (loader) loader.classList.add('hidden');
      }, 100);
    });
  </script>
</body>
